# ──────────────────────────────────────────────────────────────
# Nginx reverse-proxy config – SMT Backend (v1)
#
# Server IP: 213.199.35.225
#
# Place this file at:
#   /etc/nginx/sites-available/smt-backend
# Then enable:
#   sudo ln -s /etc/nginx/sites-available/smt-backend /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (once you have a domain pointed at this IP):
#   sudo certbot --nginx -d api.yourdomain.com
#
# Until then, the config below runs plain HTTP on port 80.
# ──────────────────────────────────────────────────────────────

# Rate-limit zone: 10 req/s per IP, 10 MB shared memory
limit_req_zone $binary_remote_addr zone=smt_api:10m rate=10r/s;

# Upstream – points at PM2 process
upstream smt_backend {
    server 127.0.0.1:3000;
    keepalive 16;
}

# ── HTTP server (IP-based, no TLS yet) ────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name 213.199.35.225;

    # ── Security headers ──────────────────────────────────────
    add_header X-Content-Type-Options  nosniff  always;
    add_header X-Frame-Options         DENY     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Body limits ───────────────────────────────────────────
    client_max_body_size 1m;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    # ── Health probes (bypass rate-limit) ─────────────────────
    location = /healthz {
        proxy_pass http://smt_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    location = /readyz {
        proxy_pass http://smt_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── WebSocket upgrade for /ws ─────────────────────────────
    location /ws {
        proxy_pass http://smt_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── API routes ────────────────────────────────────────────
    location /api/ {
        limit_req zone=smt_api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://smt_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout  10s;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;
    }

    # ── Root (info endpoint) ──────────────────────────────────
    location = / {
        proxy_pass http://smt_backend;
        proxy_set_header Host $host;
    }

    # ── Deny everything else ──────────────────────────────────
    location / {
        return 404;
    }
}

